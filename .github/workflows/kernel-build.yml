name: Fixed Full Build Lineage 18.1 for J5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # نضمن توافق حزمة libncurses5 الافتراضية
    
    steps:
      # 1. تنظيف عميق وعنيف يدوي للقرص لمنع امتلاء الخادم
      - name: Manual Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          docker image prune --all --force || true
          df -h

      # 2. تثبيت حزم التجميع الأساسية للأندرويد
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 libncurses5

      # 3. تثبيت أداة Repo من سورس جوجل الصافي
      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://googlesource.com | base64 --decode > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تفعيل كاش GitHub لتخطي حد الـ 6 ساعات
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-j5-final-18-${{ github.sha }}
          restore-keys: |
            ccache-j5-final-18-

      # 5. ضبط إعدادات الـ ccache لتسريع البناء
      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 8G
          ccache -o compression=true
          ccache -z

      # 6. المزامنة الذكية الموحدة وجلب الملفات المفقودة بشكل معزول
      - name: Download Source and Build ROM
        run: |
          mkdir android && cd android
          
          # إعداد هوية الجيت الأساسية للـ Runner
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false
          
          # تهيئة سورس LineageOS 18.1 بشكل موحد ومتطابق مع ملفات جهازك
          repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1 --git-lfs --no-repo-verify
          
          # إنشاء المانيفست المخصص لجهاز J5 2017 ومعالجه
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/j5y17lte.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="SamsungGalaxyJ5-2017/android_device_samsung_j5y17lte" path="device/samsung/j5y17lte" remote="github" revision="lineage-18.1" depth="1" />
            <project name="SamsungGalaxyJ5-2017/android_device_samsung_exynos7870-common" path="device/samsung/exynos7870-common" remote="github" revision="lineage-18.1" depth="1" />
            <project name="SamsungGalaxyJ5-2017/FlareKernel_AOSP" path="kernel/samsung/exynos7870" remote="github" revision="lineage-18.1" depth="1" />
            <project name="SamsungGalaxyJ5-2017/android_vendor_samsung" path="vendor/samsung" remote="github" revision="lineage-18.1" depth="1" />
          </manifest>
          EOF
          
          echo "Starting Repo Sync..."
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --prune || true
          
          # === الحل العبقري القاطع: كسر قفل الـ repo وسحب مجلد البناء كـ Submodule معزول ===
          if [ ! -f build/envsetup.sh ]; then
            echo "build/envsetup.sh is missing! Executing isolated submodule fetch..."
            rm -rf build
            # نأمر الجيت بتجاهل قفل أداة repo المحلية وسحب الكود الصافي مباشرة لتوزيعة 18.1
            git clone --config core.autocrlf=false --depth=1 https://github.com -b lineage-18.1 build
          fi
          
          # مسح ملفات التحميل المؤقتة لتأمين مساحة القرص قبل التجميع
          rm -rf .repo/project-objects .repo/projects/*/.git/objects/pack/tmp_*
          
          # إطلاق عملية تجميع وطبخ الروم المخصص لجهازك J5 2017
          echo "Starting Compilation Build..."
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export _JAVA_OPTIONS="-Xmx4g"
          
          source build/envsetup.sh
          lunch lineage_j5y17lte-userdebug
          mka bacon -j$(nproc --all)

      # 7. رفع ملف الروم الناتج .zip للتنزيل
      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-18-j5y17lte-ROM
          path: android/out/target/product/j5y17lte/*.zip
