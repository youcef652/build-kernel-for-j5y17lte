name: Build LineageOS 18.1 for J5 2017

on:
  workflow_dispatch: # يتيح تشغيل البناء يدويًا من واجهة الموقع

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. التخلص التام من حزم نظام GitHub وتحرير مساحة تقارب 220 جيجابايت لتخطي عقبة الـ 15G
      - name: Maximize Build Disk Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. تثبيت الحزم الأساسية المعتمدة لبناء أندرويد 11
            # 2. تثبيت الحزم المحدثة والبديلة المتوافقة مع أوبونتو لطبخ نظام أندرويد
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 libncurses5


      # 3. جلب وتثبيت أداة المزامنة Repo من جوجل
      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://googleapis.com > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تفعيل كاش GitHub Actions لحفظ ملفات البناء وتخطي حاجز الـ 6 ساعات
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-j5y17lte-18-${{ github.sha }}
          restore-keys: |
            ccache-j5y17lte-18-

      # 5. تهيئة إعدادات الـ ccache وضغطه لتقليل الحجم
      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 10G
          ccache -o compression=true
          ccache -z

      # 6. تهيئة مستودع سورس LineageOS 18.1 الرسمي والتحميل السطحي (Shallow Sync) لتوفير المساحة
      - name: Initialize Repo and Shallow Sync
        run: |
          mkdir android && cd android
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          repo init -u https://github.com -b lineage-18.1 --depth=1 --git-lfs
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # 7. جلب مستودعات شفرة هاتف J5 2017 ومعالج Exynos 7870 المخصصة لفرع 18.1
      - name: Clone Device Specific Trees
        run: |
          cd android
          # جلب ملف إعدادات الهاتف (Device Tree) لـ LineageOS 18.1
          git clone --depth=1 https://github.com -b lineage-18.1 device/samsung/j5y17lte
          
          # جلب ملف الإعدادات المشترك للمعالج (Exynos7870 Common) لـ LineageOS 18.1
          git clone --depth=1 https://github.com -b lineage-18.1 device/samsung/exynos7870-common
          
          # جلب ملفات النواة (Kernel) المتوافقة مع أندرويد 11
          git clone --depth=1 https://github.com -b lineage-18.1 kernel/samsung/exynos7870
          
          # جلب ملفات المصنع الاحتكارية (Vendor) لـ LineageOS 18.1
          git clone --depth=1 https://github.com -b lineage-18.1 vendor/samsung

      # 8. تجميع النظام وضبط متغيرات البيئة لمنع الانهيار (OOM)
      - name: Build ROM
        run: |
          cd android
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export _JAVA_OPTIONS="-Xmx4g"
          source build/envsetup.sh
          lunch lineage_j5y17lte-userdebug
          mka bacon -j$(nproc --all)

      # 9. رفع الملف النهائي بصيغة الـ zip المستهدفة للتحميل
      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-18-j5y17lte-ROM
          path: android/out/target/product/j5y17lte/*.zip
