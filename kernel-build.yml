name: Minimal Build Lineage 18.1 for J5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # نضمن توافق حزمة ncurses5 الافتراضية
    
    steps:
      # 1. تفريغ القرص يدوياً بالكامل دون العبث بتقسيم السيرفر لتفادي تجمد الـ apt
      - name: Manual Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          docker image prune --all --force
          df -h # يعرض لك المساحة الفارغة الفعلية في صفحة المراقبة لتتأكد بنفسك

      # 2. تثبيت اعتماديات التجميع الأساسية (سيعمل الآن بنجاح 100%)
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 libncurses5

      # 3. تثبيت أداة Repo
      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          # استخدام الرابط المباشر المستقر التابع لـ gerrit.googlesource
          curl https://googlesource.com | base64 --decode > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تفعيل كاش GitHub Actions لحفظ ملفات البناء وتخطي حاجز الـ 6 ساعات
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-j5-minimal-${{ github.sha }}
          restore-keys: |
            ccache-j5-minimal-

      # 5. ضبط إعدادات الـ ccache بحجم 8 جيجا ليناسب المساحة المتاحة
      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 8G
          ccache -o compression=true
          ccache -z

      # 6. التحميل السطحي والمجزأ (Extreme Shallow Sync) لتوفير المساحة
      - name: Initialize Repo and Shallow Sync
        run: |
          mkdir android && cd android
          
          # تهيئة إعدادات الجيت والهوية الإجبارية لمنع توقف الأداة
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false
          
          # ربط بافر الجيت لتفادي انهيار التحميل المفاجئ (Buffer Optimization)
          git config --global http.postBuffer 524288000
          git config --global https.postBuffer 524288000
          
          # تهيئة أداة الـ repo مع إجبارها على استخدام البايثون الحديث وتفعيل الـ git-lfs لملفات النظام المدمجة
          repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1 --git-lfs --no-repo-verify
          
          # المزامنة الذكية: جلب الفرع الحالي فقط مع حماية السكريبت وتقليل الضغط بالتزامن
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --prune
          
          # تنظيف فوري لمخلفات التحميل والملفات المؤقتة لتأمين مساحة القرص
          rm -rf .repo/project-objects .repo/projects/*/.git/objects/pack/tmp_*

      # 7. جلب ملفات شفرة هاتف J5 2017 الخاصة بـ LineageOS 18.1
      - name: Clone Device Specific Trees
        run: |
          cd android
          # جلب ملف إعدادات الهاتف (Device Tree)
          git clone --depth=1 https://github.com -b lineage-18.1 device/samsung/j5y17lte
          
          # جلب ملف الإعدادات المشترك لعائلة المعالج (Exynos7870 Common)
          git clone --depth=1 https://github.com -b lineage-18.1 device/samsung/exynos7870-common
          
          # جلب ملف النواة (Kernel) المفتوح والمستقر للتجميع
          git clone --depth=1 https://github.com -b lineage-18.1 kernel/samsung/exynos7870
          
          # جلب ملفات المصنع الاحتكارية (Vendor Blobs) للمعالج والجهاز
          git clone --depth=1 https://github.com -b lineage-18.1 vendor/samsung

      # 8. البناء الفعلي مع تقييد الذاكرة لمنع أي خطأ امتلاء مفاجئ
      - name: Build ROM
        run: |
          cd android
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export _JAVA_OPTIONS="-Xmx4g"
          source build/envsetup.sh
          lunch lineage_j5y17lte-userdebug
          mka bacon -j$(nproc --all)

      # 9. رفع ملف الـ zip النهائي للروم
      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-18-j5y17lte-ROM
          path: android/out/target/product/j5y17lte/*.zip
